services:
  dev:
    profiles: ["devcontainer"]
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    container_name: spring-vue-dev
    working_dir: /workspace
    command: sleep infinity
    ports:
      - "8080:8080"
      - "5173:5173"
    volumes:
      - .:/workspace
      - maven-cache:/root/.m2
      - npm-cache:/root/.npm

  backend:
    build:
      context: backend
      dockerfile: Dockerfile.dev
    working_dir: /app
    command: mvn spring-boot:run
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - maven-cache:/root/.m2

  frontend:
    image: node:18-bullseye
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    depends_on:
      - backend
    environment:
      VITE_API_TARGET: "http://backend:8080"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
      - npm-cache:/root/.npm

volumes:
  maven-cache:
  npm-cache:
  frontend-node-modules:
